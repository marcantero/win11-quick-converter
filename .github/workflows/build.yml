name: Windows C++ Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Això farà que es creï una Release quan facis un tag (ex: v1.0.0)
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Permís obligatori perquè el bot pugui crear la Release

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -S . -B build

    - name: Build Project
      run: cmake --build build --config Release

    - name: Create ZIP file
      run: Compress-Archive -Path build\bin\Release\* -DestinationPath SnapFormat.zip

    - name: Upload Artifact (per tenir còpia de seguretat)
      uses: actions/upload-artifact@v4
      with:
        name: SnapFormat-Binaries
        path: SnapFormat.zip

    - name: Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/') # Només s'executa si has creat un tag de versió
      uses: softprops/action-gh-release@v2
      with:
        files: SnapFormat.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}